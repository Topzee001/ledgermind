services:
  # ─── User Service ──────────────────────────────────────────────
  - type: web
    name: ledgermind-user-service
    runtime: python
    plan: free
    rootDir: user_service
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        # Replace with your Render URL after first deploy, e.g.:
        # value: ledgermind-user-service.onrender.com
        value: "*"
      - key: DATABASE_URL
        # Paste your Supabase "Transaction" (pooler) connection string here
        # Format: postgresql://USER:PASSWORD@HOST:PORT/DB?sslmode=require
        sync: false
      - key: SERVICE_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        # Add your frontend URL(s) here
        value: "http://localhost:3000"

  # ─── Transaction Service ────────────────────────────────────────
  - type: web
    name: ledgermind-transaction-service
    runtime: python
    plan: free
    rootDir: transaction_service
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        # Paste your Supabase connection string here (can be same or separate DB)
        sync: false
      - key: SERVICE_SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SERVICE_SECRET_KEY
      - key: USER_SERVICE_URL
        value: "https://ledgermind-user-service.onrender.com"
      - key: AI_SERVICE_URL
        value: "https://ledgermind-ai-service.onrender.com"

  # ─── Payment Service ────────────────────────────────────────────
  - type: web
    name: ledgermind-payment-service
    runtime: python
    plan: free
    rootDir: payment_service
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: SERVICE_SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SERVICE_SECRET_KEY
      - key: TRANSACTION_SERVICE_URL
        value: "https://ledgermind-transaction-service.onrender.com"
      - key: ISW_CLIENT_ID
        sync: false
      - key: ISW_SECRET_KEY
        sync: false
      - key: ISW_ENV
        value: "sandbox"
      - key: ISW_MERCHANT_CODE
        sync: false

  # ─── Analytics Service ──────────────────────────────────────────
  - type: web
    name: ledgermind-analytics-service
    runtime: python
    plan: free
    rootDir: analytics_service
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: SERVICE_SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SERVICE_SECRET_KEY
      - key: TRANSACTION_SERVICE_URL
        value: "https://ledgermind-transaction-service.onrender.com"

  # ─── AI Service ───────────────────────────────────────────────
  - type: web
    name: ledgermind-ai-service
    runtime: python
    plan: free
    rootDir: ai_service
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: SERVICE_SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SERVICE_SECRET_KEY
      - key: GEMINI_API_KEY
        sync: false

  # ─── API Gateway ────────────────────────────────────────────────
  - type: web
    name: ledgermind-api-gateway
    runtime: python
    plan: free
    rootDir: api_gateway
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: ledgermind-user-service
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false
        
      # The Gateway needs every service URL to route to them
      - key: USER_SERVICE_URL
        value: "https://ledgermind-user-service.onrender.com"
      - key: AI_SERVICE_URL
        value: "https://ledgermind-ai-service.onrender.com"
      - key: ANALYTICS_SERVICE_URL
        value: "https://ledgermind-analytics-service.onrender.com"
      - key: PAYMENT_SERVICE_URL
        value: "https://ledgermind-payment-service.onrender.com"
      - key: TRANSACTION_SERVICE_URL
        value: "https://ledgermind-transaction-service.onrender.com"
